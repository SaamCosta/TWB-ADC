<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <style>
      body { background: #f0f0e8; font-family: 'Segoe UI', sans-serif; }
      .navbar { background: #2c1810 !important; border-bottom: 2px solid #8b6914; }
      .navbar-brand { color: #d4a843 !important; font-weight: bold; font-size: 1.1rem; letter-spacing: 1px; }
      .nav-link { color: #c8b882 !important; font-size: 0.9rem; }
      .nav-link:hover { color: #fff !important; }
      .card { border: 1px solid #c8b882; border-radius: 4px; }
      .card-title { color: #2c1810; font-weight: 600; border-bottom: 1px solid #e8d9a0; padding-bottom: 0.4rem; }
      .border-left-success { border-left: 4px solid #28a745 !important; }
      .border-left-danger  { border-left: 4px solid #dc3545 !important; }
      .res-icon { width: 14px; height: 14px; vertical-align: middle; }
      .badge-danger  { background-color: #c0392b; }
      .badge-primary { background-color: #2471a3; }
      .nav-tabs .nav-link { color: #5d4e3a; }
      .nav-tabs .nav-link.active { color: #2c1810; font-weight: 600; border-bottom: 2px solid #8b6914; }
      .table thead.thead-dark th { background: #2c1810; color: #d4a843; border-color: #8b6914; }
      .table-striped tbody tr:nth-of-type(odd) { background-color: rgba(212,168,67,.06); }
      .report-item { background: #fff; font-size: 0.85rem; }
      .report-item:hover { background: #fdf8ec; }
      .progress { background-color: #e8d9a0; }
    </style>
    <title>TWB — Management Interface</title>
  </head>
  <body>
  <nav class="navbar navbar-expand-sm">
    <a class="navbar-brand" href="/">⚔ TWB</a>
    <ul class="navbar-nav ml-2">
      <li class="nav-item"><a class="nav-link" href="/">Status</a></li>
      <li class="nav-item"><a class="nav-link" href="/config">Configuração</a></li>
      <li class="nav-item"><a class="nav-link" href="/villages">Aldeias</a></li>
      <li class="nav-item"><a class="nav-link" href="/map">Mapa</a></li>
      <li class="nav-item"><a class="nav-link" href="/building_templates">Templates</a></li>
      <li class="nav-item"><a class="nav-link" href="/logs">Logs</a></li>
      <li class="nav-item"><a class="nav-link" href="/farmscores">Farm Score</a></li>
      <li class="nav-item"><a class="nav-link" href="/conquest">Conquistas</a></li>
      <li class="nav-item"><a class="nav-link" href="/hunter">Hunter</a></li>
      <li class="nav-item"><a class="nav-link" href="/zones">Zonas</a></li>
      <li class="nav-item"><a class="nav-link" href="/pvp_conquest">Conquista PvP</a></li>
    </ul>
  </nav>
  <div class="container-fluid mt-3">
    {% block content %}{% endblock %}
  </div>
  <script src="https://code.jquery.com/jquery-3.3.1.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  {% block scripts %}{% endblock %}
  </body>
</html>
